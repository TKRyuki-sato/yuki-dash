<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuki Dash</title>
<style>
body {
  margin: 0;
  background: white;
  font-family: sans-serif;
  text-align: center;
}

canvas {
  background: #f7f7f7;
  display: block;
  width: 100%;
  aspect-ratio: 2 / 1;
}

#score {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 24px;
  font-weight: bold;
}

#gameOver {
  position: absolute;
  top: 40%;
  width: 100%;
  font-size: 32px;
  display: none;
}

button {
  font-size: 16px;
  padding: 8px 16px;
  margin-top: 20px;
  border-radius: 8px;
}

#gameWrapper {
  position: relative;
  width: 100vw;
  max-width: 800px;
  margin: 20px auto;
}

#endingScreen {
  position: absolute;
  top: 65%;
  left: 50%;
  transform: translate(-50%, -50%);
}

</style>
</head>
<body>

<div id="gameWrapper">

  <div id="score">0</div>

  <div id="gameOver" style="display:none;">
    Game Over<br>
    <button onclick="restart()">RESTART</button>
  </div>

 <div id="endingScreen" style="display:none;"></div>

  <canvas id="game"></canvas>

</div>


<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

ctx.imageSmoothingEnabled = false;  // ←ここ追加

function resizeGame() {

  canvas.width = window.innerWidth;

  canvas.height = canvas.width / 2;

}

resizeGame();

window.addEventListener("resize", resizeGame);



let brideGroom = {
  x: canvas.width + 100,
  y: canvas.height - 60,
  width: 80,
  height: 60
};

let carpetStarted = false;
let nephewScale = 1.6; 
let dusts = [];
let sunsetAlpha = 0;
let sunsetStarted = false;
let shake = 0;
let clouds = [];
let justSpawnedDouble = false;
let sunRotation = 0;
let thanksAlpha = 0;
let confetti = [];
let confettiStarted = false;
let sparkles = [];
let frameCount = 0;
let runFrame = 0;
let birdFrame = 0;
let gravity = 0.8;
let jumpPower = -14;
let speed = 5;
let groundOffset = 0;
let obstacleTimer = 0;
let nextObstacleTime = 2000;
let score = 0;
let gameRunning = false;
let isTitle = true;
let endingYukiX = 150;
let liftDuration = 400; // 抱き上げにかける時間(ms)
let player = {
  x: 100,
  y: canvas.height - 150,
  width: 60,
  height: 60,
  dy: 0,
  grounded: true
};
let endingYukiY = canvas.height - player.height;
let grassDots = [];
function createGrass() {
  grassDots = [];
  for (let i = 0; i < 30; i++) {
    grassDots.push({
      x: Math.random() * canvas.width,
      y: canvas.height - 40 + Math.random() * 35,
      size: Math.random() * 3 + 2
    });
  }
}
let nephew = {
  x: canvas.width + 50,
  y: canvas.height - 110,  // ← ここ変更
  width: 60,
  height: 60,
  speed: 4
};


const run1 = new Image();
run1.src = "yuki-dash1ribon.png";

const run2 = new Image();
run2.src = "yuki-dash2ribon.png";

const jumpImg = new Image();
jumpImg.src = "yuki-dash1ribon.png";

const landImg = new Image();
landImg.src = "yuki-jump2ribon.png";

const birdImg = new Image();
birdImg.src = "bird1up.png";

const bird2 = new Image();
bird2.src = "bird1down.png";

const rockImg = new Image();
rockImg.src = "rock.png";

const logImg = new Image();
logImg.src = "log.png";
let obstacles = [];

const nephewRight = new Image();
nephewRight.src = "nephew-right.png";

const nephewLeft = new Image();
nephewLeft.src = "nephew-left.png";

const nephewHugRight = new Image();
nephewHugRight.src = "nephew-hug-right.png";

const nephewHugLeft = new Image();
nephewHugLeft.src = "nephew-hug-left.png";

const yukiHug = new Image();
yukiHug.src = "yuki-hug.png";

const yukiHugScale = 0.6;

const brideGroomImg = new Image();
brideGroomImg.src = "satoshiaya.png";



const SPECIAL_SCORE = 800;
let inEnding = false;
let endingStartTime = 0;
let hasMet = false;
let meetTime = 0;

function spawnObstacle() {

  let type;

  // 20%の確率で鳥（スコア少し進んでから）
let r = Math.random();

if (r < 0.20 && score > 500) {
  type = "bird";
}
else {
  type = "rock";
}

  let height = 55;
  let y = canvas.height - height - 10;

  // 鳥の高さ
  if (type === "bird") {
    height = 40;
    y = canvas.height - 115; // ゆきくんの少し上
  }

  if (type === "rock") {
  height = 50;
}

if (type === "log") {
  height = 40;
}

  obstacles.push({
    x: canvas.width,
    y: y,
    width: 35,
    height: height,
    type: type
  });
}

function createClouds() {

  clouds = [];

  for (let i = 0; i < 5; i++) {

    clouds.push({
      x: Math.random() * canvas.width,
      y: 40 + Math.random() * 80,
      size: 40 + Math.random() * 40
    });

  }
}


createGrass();
createClouds();


function update() {

  ctx.save();

  if (shake > 0) {
    ctx.translate(Math.random() * 6 - 3, Math.random() * 6 - 3);
    shake--;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ===== タイトル =====
  if (isTitle) {
    drawTitle();
  }

  // ===== エンディング =====
  else if (inEnding) {
    drawEnding();
  }

  // ===== ゲーム停止中 =====
  else if (!gameRunning) {
    // 何も描かない
  }

  // ===== 通常ゲーム =====

  
  else {
    // 背景（空）
ctx.fillStyle = "#87CEEB";
ctx.fillRect(0, 0, canvas.width, canvas.height);


// 夕焼けフェード
if (sunsetStarted && sunsetAlpha < 1) {
  sunsetAlpha += 0.03;
}

ctx.globalAlpha = sunsetAlpha;
ctx.fillStyle = "#FFB74D";
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.globalAlpha = 1;


// 太陽
sunRotation += 0.01;

ctx.save();
ctx.translate(700, 80); // 太陽の位置

ctx.rotate(sunRotation);

ctx.fillStyle = "#FFD54F";
ctx.beginPath();
ctx.arc(0, 0, 30, 0, Math.PI * 2);
ctx.fill();

// 光
for (let i = 0; i < 8; i++) {

  ctx.rotate(Math.PI / 4);

  ctx.fillRect(35, -3, 15, 6);

}

ctx.restore();


   //雲
ctx.fillStyle = "white";

for (let cloud of clouds) {

  cloud.x -= speed * 0.3; // 地面より遅い

  if (cloud.x < -100) {
    cloud.x = canvas.width + Math.random() * 200;
    cloud.y = 40 + Math.random() * 80;
  }

  ctx.beginPath();
  ctx.arc(cloud.x, cloud.y, cloud.size * 0.5, 0, Math.PI * 2);
  ctx.arc(cloud.x + cloud.size * 0.5, cloud.y + 10, cloud.size * 0.4, 0, Math.PI * 2);
  ctx.arc(cloud.x - cloud.size * 0.5, cloud.y + 10, cloud.size * 0.4, 0, Math.PI * 2);
  ctx.fill();
}

  // 床（草原）
ctx.fillStyle = "#4CAF50";
ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

// 草のライン（動く）
ctx.fillStyle = "#388E3C";

for (let i = 0; i < canvas.width / 40 + 2; i++) {
  let x = (i * 40 - groundOffset % 40);
  ctx.fillRect(x, canvas.height - 40, 20, 5);
}
// 草の点々
ctx.fillStyle = "#2E7D32";

for (let dot of grassDots) {
  dot.x -= speed;

  if (dot.x < -5) {
    dot.x = canvas.width + Math.random() * 50;
    dot.y = canvas.height - 40 + Math.random() * 35;
  }

  ctx.fillRect(dot.x, dot.y, dot.size, dot.size);
}

for (let i = dusts.length - 1; i >= 0; i--) {

  let d = dusts[i];

  d.x += d.dx;
  d.size += 0.3;
  d.alpha -= 0.03;

  ctx.globalAlpha = d.alpha;
  ctx.fillStyle = "#cccccc";

  ctx.beginPath();
  ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1;

  if (d.alpha <= 0) {
    dusts.splice(i, 1);
  }
}



    player.dy += gravity;
    player.y += player.dy;

    if (player.y + player.height >= canvas.height) {
      player.y = canvas.height - player.height;
      player.dy = 0;
      player.grounded = true;
    }

    if (!player.grounded) {
  ctx.drawImage(jumpImg, player.x, player.y, player.width, player.height);
} else {
  if (runFrame === 0) {
    ctx.drawImage(run1, player.x, player.y, player.width, player.height);
  } else {
    ctx.drawImage(run2, player.x, player.y, player.width, player.height);
  }
}


      for (let i = 0; i < obstacles.length; i++) {

  let obs = obstacles[i];
  obs.x -= speed;

  if (obs.type === "bird") {

    if (birdFrame === 0) {
      ctx.drawImage(birdImg, obs.x, obs.y, obs.width, obs.height);
    } else {
      ctx.drawImage(bird2, obs.x, obs.y, obs.width, obs.height);
    }

  }
  else if (obs.type === "rock") {

  ctx.drawImage(
    rockImg,
    obs.x - 20,     // 左に少し広げる
    obs.y - 20,     // 上に広げる
    obs.width + 40, // 横サイズ
    obs.height + 40 // 縦サイズ
  );

}
  else if (obs.type === "log") {

    ctx.drawImage(logImg, obs.x, obs.y, obs.width, obs.height);

  }

  // 当たり判定
  if (
    player.x < obs.x + obs.width &&
    player.x + player.width > obs.x &&
    player.y < obs.y + obs.height &&
    player.y + player.height > obs.y
  ) {

    shake = 10;

    if (score >= SPECIAL_SCORE) {
      startSpecialEnding();
    } else {
      gameOver();
    }

  }

}

    obstacles = obstacles.filter(obs => obs.x + obs.width > 0);

    

    score++;
    document.getElementById("score").innerText = score;

    if (score >= 800 && !sunsetStarted) {
  sunsetStarted = true;
}

    
    if (score < 1500) {
  speed = 6.5 + score / 3000;
}
else if (score < 2500) {
  speed = 7.5 + score / 2000;
}
else {
  speed = 9 + score / 1000;
}

    groundOffset += speed;


    


    frameCount++;

if (frameCount % 10 === 0) {
  runFrame = (runFrame + 1) % 2;
}
if (frameCount % 15 === 0) {
  birdFrame = (birdFrame + 1) % 2;
}


obstacleTimer += 16;

if (obstacleTimer > nextObstacleTime) {

  spawnObstacle();

  // たまに連続障害物
 if (Math.random() < 0.35 && score > 500) {

  let delay = 600 + Math.random() * 200;

  setTimeout(() => {
    spawnObstacle();
  }, delay);

  justSpawnedDouble = true;
}

  obstacleTimer = 0;

  if (justSpawnedDouble) {

  nextObstacleTime = 1400 + Math.random() * 800;
  justSpawnedDouble = false;

}
else if (score < 1500) {

  nextObstacleTime = 1400 + Math.random() * 900;

}
else if (score < 3000) {

  nextObstacleTime = 900 + Math.random() * 700;

}
else {

  nextObstacleTime = 600 + Math.random() * 500;

}
}
  }
  ctx.restore();

  requestAnimationFrame(update);
}

function jump() {

  if (isTitle) {
    isTitle = false;
    gameRunning = true;
    return;
  }

  if (player.grounded && gameRunning) {

    // 土煙
    for (let i = 0; i < 3; i++) {
      dusts.push({
        x: player.x + 20,
        y: player.y + player.height - 5,
        size: 8,
        alpha: 1,
        dx: (Math.random() - 0.5) * 2
      });
    }

    player.dy = jumpPower;
    player.grounded = false;
  }
}


function gameOver() {
  gameRunning = false;
  document.getElementById("gameOver").style.display = "block";
}

function drawEnding() {
  let elapsed = Date.now() - endingStartTime;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // 背景（屋内）
ctx.fillStyle = "#2C2C2C";
ctx.fillRect(0, 0, canvas.width, canvas.height);

// 床（屋内フロア）
ctx.fillStyle = "#444";
ctx.fillRect(0, canvas.height - 80, canvas.width, 80);

// ウェディングロード（中央赤）
ctx.fillStyle = "#B71C1C";
ctx.fillRect(
  canvas.width / 2 - 80,
  canvas.height - 80,
  160,
  80
);


  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.font = "30px sans-serif";

  if (elapsed < 1500) {

  // 真っ黒背景
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // テキスト
  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.font = "bold 42px sans-serif";

  ctx.fillText("IT'S NOT", canvas.width / 2, canvas.height / 2 - 20);
ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 + 30);

}
  else if (elapsed < 3500) {

  // 屋外背景（通常と同じ）
 ctx.fillStyle = "#FFB74D";
ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#4CAF50";
  ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

  // 転んだゆき（仮で通常表示）
  ctx.drawImage(run1, endingYukiX, endingYukiY, player.width, player.height);

  // 甥っ子がゆきの横まで移動
  // ---- 駆け寄り停止位置をゆき基準にする ----
let targetX = endingYukiX - 10; // ゆきのすぐ横で止める

if (nephew.x > targetX) {
  nephew.x -= nephew.speed;
}


  // 甥っ子描画
  ctx.drawImage(
  nephewLeft,
  nephew.x,
  nephew.y,
  nephew.width * nephewScale,
  nephew.height * nephewScale
);


}

else if (elapsed < 4200) {

  // 屋外背景
  ctx.fillStyle = "#FFB74D";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#4CAF50";
  ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

  // ゆき
  ctx.drawImage(run1, endingYukiX, endingYukiY, player.width, player.height);


  // 甥っ子（止まった位置）
  ctx.drawImage(
  nephewLeft,
  nephew.x,
  nephew.y,
  nephew.width * nephewScale,
  nephew.height * nephewScale
);

}

else if (elapsed < 5500) {

  // 屋外背景
  ctx.fillStyle = "#FFB74D";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#4CAF50";
  ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

  // 甥っ子（止まってる）
  ctx.drawImage(
  nephewLeft,
  nephew.x,
  nephew.y,
  nephew.width * nephewScale,
  nephew.height * nephewScale
);

  // ---- 抱き上げアニメーション ----
  let liftStart = 4200;
  let progress = Math.min((elapsed - liftStart) / liftDuration, 1);

  // 横は少し甥っ子側に寄せる
  let yukiX = endingYukiX + (nephew.x + 10 - endingYukiX) * progress;

  // 上に持ち上げる
  let yukiY = endingYukiY - 25 * progress;

  ctx.drawImage(
  yukiHug,
  yukiX + player.width * (1 - yukiHugScale) / 2,
  yukiY + player.height * (1 - yukiHugScale) / 2,
  player.width * yukiHugScale,
  player.height * yukiHugScale
);
}



  else if (elapsed < 6500) {

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.font = "bold 44px sans-serif";

  ctx.fillText("LET'S", canvas.width / 2, canvas.height / 2 - 20);
ctx.fillText("GO", canvas.width / 2, canvas.height / 2 + 30);

}

  else {

    if (!carpetStarted) {
    nephew.x = -120;
    carpetStarted = true;
  }


  // ---- 屋内背景 ----

  ctx.fillStyle = "#2C2C2C";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#444";
  ctx.fillRect(0, canvas.height - 80, canvas.width, 80);

  ctx.fillStyle = "#B71C1C";
  ctx.fillRect(0, canvas.height - 80, canvas.width, 80);



  // ---- 甥っ子移動（停止付き）----
  if (!hasMet) {

    let nextX = nephew.x + 1.5;

    if (nextX + nephew.width >= brideGroom.x) {
    nephew.x = brideGroom.x - nephew.width;
    hasMet = true;
    meetTime = Date.now();

    for (let i = 0; i < 12; i++) {
  sparkles.push({
    x: nephew.x + nephew.width,
    y: nephew.y - 20,
    radius: Math.random() * 4 + 2,
    alpha: 1,
    dx: (Math.random() - 0.5) * 4,
    dy: (Math.random() - 0.5) * 4
  });
}
for (let i = confetti.length - 1; i >= 0; i--) {

  let c = confetti[i];

  c.y += c.speedY;
  c.x += c.speedX;

  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(c.rotation * Math.PI / 180);

  ctx.fillStyle = c.color;
  ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size);

  ctx.restore();

  if (c.y > canvas.height + 20) {
    confetti.splice(i, 1);
  }
}

}

     else {
      nephew.x = nextX;
    }
  }


  // ---- 描画 ----
  ctx.drawImage(
  brideGroomImg,
  brideGroom.x,
  brideGroom.y - 60,
  brideGroom.width * 2,
  brideGroom.height * 2
);

  ctx.drawImage(
  nephewHugRight,
  nephew.x,
  nephew.y,
  nephew.width * nephewScale,
  nephew.height * nephewScale
);

  ctx.drawImage(
  yukiHug,
  nephew.x + 45,
  nephew.y + 30,
  player.width * yukiHugScale,
  player.height * yukiHugScale
);


  // ---- キラ描画（毎フレーム）----
for (let i = sparkles.length - 1; i >= 0; i--) {
  let s = sparkles[i];

  s.x += s.dx;
  s.y += s.dy;
  s.alpha -= 0.02; // 少しゆっくり消す

  ctx.globalAlpha = s.alpha;
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
  ctx.fillStyle = "#FFD700";
  ctx.fill();
  ctx.globalAlpha = 1;

  if (s.alpha <= 0) {
    sparkles.splice(i, 1);
  }
}

// ---- thanks to you フェード（合流後のみ）----
if (hasMet) {

  let clearElapsed = Date.now() - meetTime;

  if (clearElapsed > 1500) {

    if (thanksAlpha < 1) {
      thanksAlpha += 0.02;
    }

    ctx.globalAlpha = thanksAlpha;

    ctx.fillStyle = "#FFFFFF";
    ctx.font = "28px serif";
    ctx.textAlign = "center";
    ctx.fillText("thanks to you", canvas.width / 2, canvas.height / 2 + 40);

    ctx.globalAlpha = 1;
  }
}

for (let i = confetti.length - 1; i >= 0; i--) {

  let c = confetti[i];

  c.y += c.speedY;
  c.x += c.speedX;

  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(c.rotation * Math.PI / 180);

  ctx.fillStyle = c.color;
  ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size);

  ctx.restore();

  if (c.y > canvas.height + 20) {
    confetti.splice(i, 1);
  }
}

}

// ---- 合流後1秒で表示 ----
if (hasMet && Date.now() - meetTime > 1000) {

  ctx.fillStyle = "white";
  ctx.textAlign = "center";

  // BEST SCORE
  ctx.font = "bold 28px monospace";
  ctx.fillText("BEST SCORE " + score, canvas.width / 2, canvas.height / 2 - 60);

  // GAME CLEAR
  ctx.font = "bold 48px sans-serif";
  ctx.fillText("GAME CLEAR", canvas.width / 2, canvas.height / 2);


  document.getElementById("endingScreen").style.display = "block";

  if (!confettiStarted) {

  confettiStarted = true;

  for (let i = 0; i < 80; i++) {

    let colors = ["#FFD700", "#FFFFFF", "#F8C8DC"];

    confetti.push({
      x: Math.random() * canvas.width,
      y: -20,
      size: Math.random() * 6 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      speedY: Math.random() * 2 + 2,
      speedX: (Math.random() - 0.5) * 2,
      rotation: Math.random() * 360
    });
  }
}
}


 
}




function drawTitle() {

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.textAlign = "center";

  // タイトル
  ctx.font = "60px sans-serif";
  ctx.fillText("YUKI DASH", canvas.width / 2, canvas.height / 2 - 80);

  // 目標スコア

  ctx.fillStyle = "#FFD700";
ctx.font = "24px monospace";
ctx.fillText("REACH 800 FOR THE TRUE ENDING", canvas.width / 2, canvas.height / 2);

ctx.fillStyle = "white";

  // スタート
  ctx.font = "30px sans-serif";
  ctx.fillText("TAP TO START", canvas.width / 2, canvas.height / 2 + 60);
}


function startSpecialEnding() {
  gameRunning = false;
  inEnding = true;
  endingStartTime = Date.now();
  document.getElementById("score").style.display = "none";

  brideGroom.x = canvas.width - 220;

  // 甥っ子は右から登場
  nephew.x = canvas.width + 50;
}



function restart() {
  carpetStarted = false;

  obstacles = [];
  score = 0;
  speed = 5;

  gameRunning = true;
  inEnding = false;

  hasMet = false;
  meetTime = 0;
  brideGroom.x = canvas.width + 100;
  confetti = [];
  confettiStarted = false;
  thanksAlpha = 0;

  player.y = canvas.height - player.height;
  player.dy = 0;
  player.grounded = true;
  nephew.x = canvas.width + 50;

  document.getElementById("gameOver").style.display = "none";
  document.getElementById("endingScreen").style.display = "none";
  document.getElementById("score").innerText = score;
  document.getElementById("score").style.display = "block";
}



window.addEventListener("touchstart", jump);
