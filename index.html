<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuki Dash</title>
<style>
body {
  margin: 0;
  background: white;
  font-family: sans-serif;
  text-align: center;
}

canvas {
  background: #f7f7f7;
  display: block;
  width: 100%;
  aspect-ratio: 2 / 1;
}

#score {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 24px;
  font-weight: bold;
}

#gameOver {
  position: absolute;
  top: 40%;
  width: 100%;
  font-size: 32px;
  display: none;
}

button {
  font-size: 16px;
  padding: 8px 16px;
  margin-top: 20px;
  border-radius: 8px;
}

#gameWrapper {
  position: relative;
  width: 100vw;
  max-width: 800px;
  margin: 20px auto;
}

#endingScreen {
  position: absolute;
  top: 65%;
  left: 50%;
  transform: translate(-50%, -50%);
}

</style>
</head>
<body>

<div id="gameWrapper">

  <div id="score">0</div>

  <div id="gameOver" style="display:none;">
    Game Over<br>
    <button onclick="restart()">もう一回</button>
  </div>

 <div id="endingScreen" style="display:none;"></div>

  <canvas id="game"></canvas>

</div>


<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 400;



let brideGroom = {
  x: canvas.width + 100,
  y: canvas.height - 60,
  width: 80,
  height: 60
};
let thanksAlpha = 0;
let confetti = [];
let confettiStarted = false;
let sparkles = [];
let frameCount = 0;
let runFrame = 0;
let gravity = 0.8;
let jumpPower = -15;
let speed = 5;
let groundOffset = 0;
let score = 0;
let gameRunning = false;
let isTitle = true;
let endingYukiX = 150;
let liftDuration = 400; // 抱き上げにかける時間(ms)
let player = {
  x: 100,
  y: canvas.height - 150,
  width: 60,
  height: 60,
  dy: 0,
  grounded: true
};
let endingYukiY = canvas.height - player.height;
let grassDots = [];
function createGrass() {
  grassDots = [];
  for (let i = 0; i < 30; i++) {
    grassDots.push({
      x: Math.random() * canvas.width,
      y: canvas.height - 40 + Math.random() * 35,
      size: Math.random() * 3 + 2
    });
  }
}
let nephew = {
  x: canvas.width + 50,
  y: canvas.height - 80,  // ← ここ変更
  width: 60,
  height: 60,
  speed: 4
};


const run1 = new Image();
run1.src = "yuki-dash1ribon.png";

const run2 = new Image();
run2.src = "yuki-dash2ribon.png";

const jumpImg = new Image();
jumpImg.src = "yuki-dash1ribon.png";

const landImg = new Image();
landImg.src = "yuki-jump2ribon.png";



let obstacles = [];


const SPECIAL_SCORE = 500;
let inEnding = false;
let endingStartTime = 0;
let hasMet = false;
let meetTime = 0;

function spawnObstacle() {
  let height = 60;
  obstacles.push({
    x: canvas.width,
    y: canvas.height - height,
    width: 40,
    height: height
  });
}

setInterval(spawnObstacle, 2200);

createGrass();

function update() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ===== タイトル =====
  if (isTitle) {
    drawTitle();
  }

  // ===== エンディング =====
  else if (inEnding) {
    drawEnding();
  }

  // ===== ゲーム停止中 =====
  else if (!gameRunning) {
    // 何も描かない
  }

  // ===== 通常ゲーム =====

  
  else {
    // 背景（空）
ctx.fillStyle = "#87CEEB";
ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 床（草原）
ctx.fillStyle = "#4CAF50";
ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

// 草のライン（動く）
ctx.fillStyle = "#388E3C";

for (let i = 0; i < canvas.width / 40 + 2; i++) {
  let x = (i * 40 - groundOffset % 40);
  ctx.fillRect(x, canvas.height - 40, 20, 5);
}
// 草の点々
ctx.fillStyle = "#2E7D32";

for (let dot of grassDots) {
  dot.x -= speed;

  if (dot.x < -5) {
    dot.x = canvas.width + Math.random() * 50;
    dot.y = canvas.height - 40 + Math.random() * 35;
  }

  ctx.fillRect(dot.x, dot.y, dot.size, dot.size);
}



    player.dy += gravity;
    player.y += player.dy;

    if (player.y + player.height >= canvas.height) {
      player.y = canvas.height - player.height;
      player.dy = 0;
      player.grounded = true;
    }

    if (!player.grounded) {
  ctx.drawImage(jumpImg, player.x, player.y, player.width, player.height);
} else {
  if (runFrame === 0) {
    ctx.drawImage(run1, player.x, player.y, player.width, player.height);
  } else {
    ctx.drawImage(run2, player.x, player.y, player.width, player.height);
  }
}

    ctx.fillStyle = "black";

    for (let i = 0; i < obstacles.length; i++) {
      let obs = obstacles[i];
      obs.x -= speed;

      ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

      if (
        player.x < obs.x + obs.width &&
        player.x + player.width > obs.x &&
        player.y < obs.y + obs.height &&
        player.y + player.height > obs.y
      ) {
        if (score >= SPECIAL_SCORE) {
          startSpecialEnding();
        } else {
          gameOver();
        }
      }
    }

    obstacles = obstacles.filter(obs => obs.x + obs.width > 0);

    

    score++;
    document.getElementById("score").innerText = score;

    groundOffset += speed;


    

    if (score % 500 === 0) {
      speed += 0.5;
    }

    frameCount++;

if (frameCount % 10 === 0) {
  runFrame = (runFrame + 1) % 2;
}

  }

  requestAnimationFrame(update);
}

function jump() {

  if (isTitle) {
    isTitle = false;
    gameRunning = true;
    return;
  }

  if (player.grounded && gameRunning) {
    player.dy = jumpPower;
    player.grounded = false;
  }
}


function gameOver() {
  gameRunning = false;
  document.getElementById("gameOver").style.display = "block";
}

function drawEnding() {
  let elapsed = Date.now() - endingStartTime;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // 背景（屋内）
ctx.fillStyle = "#2C2C2C";
ctx.fillRect(0, 0, canvas.width, canvas.height);

// 床（屋内フロア）
ctx.fillStyle = "#444";
ctx.fillRect(0, canvas.height - 80, canvas.width, 80);

// ウェディングロード（中央赤）
ctx.fillStyle = "#B71C1C";
ctx.fillRect(
  canvas.width / 2 - 80,
  canvas.height - 80,
  160,
  80
);


  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.font = "30px sans-serif";

  if (elapsed < 1500) {
    // Phase 0: 転ぶ
    ctx.fillText("ゆきくん、転ぶ…", canvas.width / 2, canvas.height / 2);
  } 
  else if (elapsed < 3500) {

  // 屋外背景（通常と同じ）
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#4CAF50";
  ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

  // 転んだゆき（仮で通常表示）
  ctx.drawImage(run1, endingYukiX, endingYukiY, player.width, player.height);

  // 甥っ子がゆきの横まで移動
  // ---- 駆け寄り停止位置をゆき基準にする ----
let targetX = endingYukiX - 10; // ゆきのすぐ横で止める

if (nephew.x > targetX) {
  nephew.x -= nephew.speed;
}


  // 甥っ子描画（黒四角）
  ctx.fillStyle = "black";
  ctx.fillRect(nephew.x, nephew.y, nephew.width, nephew.height);
}

else if (elapsed < 4200) {

  // 屋外背景
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#4CAF50";
  ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

  // ゆき
  ctx.drawImage(run1, endingYukiX, endingYukiY, player.width, player.height);


  // 甥っ子（止まった位置）
  ctx.fillStyle = "black";
  ctx.fillRect(nephew.x, nephew.y, nephew.width, nephew.height);
}

else if (elapsed < 5500) {

  // 屋外背景
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#4CAF50";
  ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

  // 甥っ子（止まってる）
  ctx.fillStyle = "black";
  ctx.fillRect(nephew.x, nephew.y, nephew.width, nephew.height);

  // ---- 抱き上げアニメーション ----
  let liftStart = 4200;
  let progress = Math.min((elapsed - liftStart) / liftDuration, 1);

  // 横は少し甥っ子側に寄せる
  let yukiX = endingYukiX + (nephew.x + 10 - endingYukiX) * progress;

  // 上に持ち上げる
  let yukiY = endingYukiY - 40 * progress;

  ctx.drawImage(run1, yukiX, yukiY, player.width, player.height);
}



  else if (elapsed < 6500) {
    // Phase 2: リングを届ける
    ctx.fillText("リングを届ける。", canvas.width / 2, canvas.height / 2);
  } 

  else {

  // ---- 屋内背景 ----
  ctx.fillStyle = "#2C2C2C";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#444";
  ctx.fillRect(0, canvas.height - 80, canvas.width, 80);

  ctx.fillStyle = "#B71C1C";
  ctx.fillRect(0, canvas.height - 80, canvas.width, 80);



  // ---- 甥っ子移動（停止付き）----
  if (!hasMet) {

    let nextX = nephew.x + 2;

    if (nextX + nephew.width >= brideGroom.x) {
    nephew.x = brideGroom.x - nephew.width;
    hasMet = true;
    meetTime = Date.now();

    for (let i = 0; i < 12; i++) {
  sparkles.push({
    x: nephew.x + nephew.width,
    y: nephew.y - 20,
    radius: Math.random() * 4 + 2,
    alpha: 1,
    dx: (Math.random() - 0.5) * 4,
    dy: (Math.random() - 0.5) * 4
  });
}
for (let i = confetti.length - 1; i >= 0; i--) {

  let c = confetti[i];

  c.y += c.speedY;
  c.x += c.speedX;

  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(c.rotation * Math.PI / 180);

  ctx.fillStyle = c.color;
  ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size);

  ctx.restore();

  if (c.y > canvas.height + 20) {
    confetti.splice(i, 1);
  }
}

}

     else {
      nephew.x = nextX;
    }
  }


  // ---- 描画 ----
  ctx.fillStyle = "white";
  ctx.fillRect(brideGroom.x, brideGroom.y, brideGroom.width, brideGroom.height);

  ctx.fillStyle = "black";
  ctx.fillRect(nephew.x, nephew.y, nephew.width, nephew.height);

  ctx.drawImage(
    run1,
    nephew.x + 10,
    nephew.y - 40,
    player.width,
    player.height
  );
  // ---- キラ描画（毎フレーム）----
for (let i = sparkles.length - 1; i >= 0; i--) {
  let s = sparkles[i];

  s.x += s.dx;
  s.y += s.dy;
  s.alpha -= 0.02; // 少しゆっくり消す

  ctx.globalAlpha = s.alpha;
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
  ctx.fillStyle = "#FFD700";
  ctx.fill();
  ctx.globalAlpha = 1;

  if (s.alpha <= 0) {
    sparkles.splice(i, 1);
  }
}

// ---- thanks to you フェード（合流後のみ）----
if (hasMet) {

  let clearElapsed = Date.now() - meetTime;

  if (clearElapsed > 1500) {

    if (thanksAlpha < 1) {
      thanksAlpha += 0.02;
    }

    ctx.globalAlpha = thanksAlpha;

    ctx.fillStyle = "#FFFFFF";
    ctx.font = "28px serif";
    ctx.textAlign = "center";
    ctx.fillText("thanks to you", canvas.width / 2, canvas.height / 2 + 40);

    ctx.globalAlpha = 1;
  }
}

for (let i = confetti.length - 1; i >= 0; i--) {

  let c = confetti[i];

  c.y += c.speedY;
  c.x += c.speedX;

  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(c.rotation * Math.PI / 180);

  ctx.fillStyle = c.color;
  ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size);

  ctx.restore();

  if (c.y > canvas.height + 20) {
    confetti.splice(i, 1);
  }
}

}

// ---- 合流後1秒で表示 ----
if (hasMet && Date.now() - meetTime > 1000) {

  ctx.fillStyle = "white";
  ctx.font = "48px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("GAME CLEAR", canvas.width / 2, canvas.height / 2 - 20);

  document.getElementById("endingScreen").style.display = "block";

  if (!confettiStarted) {

  confettiStarted = true;

  for (let i = 0; i < 80; i++) {

    let colors = ["#FFD700", "#FFFFFF", "#F8C8DC"];

    confetti.push({
      x: Math.random() * canvas.width,
      y: -20,
      size: Math.random() * 6 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      speedY: Math.random() * 2 + 2,
      speedX: (Math.random() - 0.5) * 2,
      rotation: Math.random() * 360
    });
  }
}
}


 
}




function drawTitle() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.textAlign = "center";

  ctx.font = "60px sans-serif";
  ctx.fillText("YUKI DASH", canvas.width / 2, canvas.height / 2 - 40);

  ctx.font = "30px sans-serif";
  ctx.fillText("TAP TO START", canvas.width / 2, canvas.height / 2 + 40);
}

function startSpecialEnding() {
  gameRunning = false;
  inEnding = true;
  endingStartTime = Date.now();
  document.getElementById("score").style.display = "none";
  brideGroom.x = canvas.width / 2 + 40;

  // 甥っ子は画面右外からスタート
  nephew.x = canvas.width + 60;
}



function restart() {
  obstacles = [];
  score = 0;
  speed = 5;

  gameRunning = true;
  inEnding = false;

  hasMet = false;
  meetTime = 0;
  brideGroom.x = canvas.width + 100;
  confetti = [];
  confettiStarted = false;
  thanksAlpha = 0;

  player.y = canvas.height - player.height;
  player.dy = 0;
  player.grounded = true;
  nephew.x = canvas.width + 50;

  document.getElementById("gameOver").style.display = "none";
  document.getElementById("endingScreen").style.display = "none";
  document.getElementById("score").innerText = score;
  document.getElementById("score").style.display = "block";
}



window.addEventListener("touchstart", jump);
window.addEventListener("click", jump);

update();
</script>

</body>
</html>
